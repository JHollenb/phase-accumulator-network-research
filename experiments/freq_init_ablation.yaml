# Experiment H — frequency-init ablation (Fourier vs random).
# If random-init still grokks, the architecture is doing the work.
# If only Fourier-init grokks, the good init is doing most of the work.
experiment: freq_init_ablation
out_dir:    results/freq_init_ablation

base:
  p:                113
  k_freqs:          9
  n_steps:          200000
  weight_decay:     0.01
  diversity_weight: 0.01
  log_every:        500
  early_stop:       true
  save_model:       true

experiment_args:
  seeds: [42, 123, 456, 789, 999]
