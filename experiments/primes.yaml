# Cross-prime generalization: reliability curve across a range of primes.
experiment: grid_sweep
out_dir:    results/primes

base:
  k_freqs:          9
  n_steps:          200000
  weight_decay:     0.01
  diversity_weight: 0.01
  log_every:        500
  early_stop:       true

grid:
  p: [43, 67, 89, 113, 127]

plots:
  - {type: sweep_reliability, group_by: p,
     filename: reliability.png,
     title: "Cross-prime generalization  —  K=9"}
