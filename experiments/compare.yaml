# PAN vs transformer head-to-head, mod-113.
# Reproduces the Tier 1 comparison from the paper.
experiment: compare
out_dir:    results/compare
dry_run:    false

base:
  p:           113
  task_kind:   mod_add
  k_freqs:     9
  n_steps:     50000
  seed:        42
  batch_size:  256
  lr:          1.0e-3
  log_every:   200
  early_stop:  true
  val_samples: null          # use full val set
  use_compile: false
