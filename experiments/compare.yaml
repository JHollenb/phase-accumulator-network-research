# PAN vs transformer head-to-head, mod-113.
# Reproduces the Tier 1 comparison from the paper.
experiment: grid_sweep
out_dir:    results/compare

base:
  p:           113
  task_kind:   mod_add
  k_freqs:     9
  n_steps:     50000
  seed:        42
  batch_size:  256
  lr:          1.0e-3
  log_every:   200
  early_stop:  true
  val_samples: null          # use full val set
  use_compile: false
  freq_init:   fourier
  save_model:  true

# Coupled axes: the transformer needs its own weight_decay. Use the explicit
# list-of-dicts form so each sub-run gets its correct settings.
grid:
  - {model_kind: pan,         weight_decay: 0.01, label: pan}
  - {model_kind: transformer, weight_decay: 1.0,  label: tf}

plots:
  - {type: training_curves, title: "PAN vs Transformer"}
  - {type: parameter_efficiency}
  - {type: ablation_bars}
