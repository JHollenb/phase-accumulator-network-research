# Diversity-weight reliability sweep at K=9.
# NOTE: this sweep is the main reason to re-run the old experiments —
# the diversity regularizer in the original pan.py was silently broken
# (computed phi_a/phi_b under torch.no_grad() so gradients into encoder
# frequencies were dropped). pan_lab routes DW through mix_features()
# which keeps the encoder edges live.
experiment: dw_sweep
out_dir:    results/dw_sweep

base:
  p:            113
  n_steps:      100000
  weight_decay: 0.01
  log_every:    500
  early_stop:   true

experiment_args:
  dws:     [0.0, 0.005, 0.01, 0.02, 0.05, 0.1]
  seeds:   [42, 123, 456, 789, 999]
  k_freqs: 9
